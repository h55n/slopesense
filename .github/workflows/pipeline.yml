name: SlopeSense 24/7 Pipeline

on:
  schedule:
    - cron: "0 0,6,12,18 * * *"  # Runs at 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:  # Allow manual triggers

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    if: ${{ secrets.DATABASE_URL != '' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Dependencies
        run: |
          pip install -r backend/requirements.txt

      - name: Execute FPI Engine & Alert Dispatcher
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          WHATSAPP_API_TOKEN: ${{ secrets.WHATSAPP_API_TOKEN }}
          WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
        run: |
          python scripts/run_pipeline_standalone.py
