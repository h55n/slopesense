upstream api {
    server api:8000;
}

upstream frontend {
    server frontend:3000;
}

server {
    listen 80;
    server_name slopesense.in www.slopesense.in localhost;

    # Increase buffer for large GeoJSON responses
    proxy_buffer_size          128k;
    proxy_buffers              4 256k;
    proxy_busy_buffers_size    256k;

    # API routes
    location /v1/ {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;

        # CORS headers
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # API docs
    location /docs {
        proxy_pass http://api;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://api;
        proxy_set_header Host $host;
    }

    # WebSocket for live updates
    location /ws/ {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # CAP feed (XML) — cache 5 minutes
    location /v1/cap/ {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_cache_valid 200 5m;
        add_header Content-Type "application/xml; charset=utf-8";
        add_header Cache-Control "public, max-age=300";
    }

    # Internal routes (protected)
    location /internal/ {
        allow 127.0.0.1;
        allow 172.0.0.0/8;  # Docker internal network
        deny all;
        proxy_pass http://api;
    }

    # Frontend (everything else)
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types application/json application/xml text/css text/javascript application/javascript;
}
