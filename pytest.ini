[pytest]
testpaths = backend/tests
asyncio_mode = auto
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Default options — verbose, short tracebacks, coverage
addopts =
    -v
    --tb=short
    --no-header
    -p no:cacheprovider
    --strict-markers

# Custom markers (use with: pytest -m unit)
markers =
    unit: Pure unit tests — no external dependencies, no DB
    integration: Integration tests — requires running database
    slow: Tests that take longer than 5 seconds
    api: Tests that exercise HTTP endpoints via the ASGI test client

# Suppress noisy deprecation warnings from third-party libraries
filterwarnings =
    ignore::DeprecationWarning:ast:
    ignore::PendingDeprecationWarning:starlette:
    ignore::DeprecationWarning:reportlab:

# Log configuration for test output
log_cli = false
log_level = WARNING
